[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @apps/web... build"

[deploy]
startCommand = "pnpm --filter @apps/web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.watchPatterns]
patterns = [
  "apps/web/**",
  "packages/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json"
]
